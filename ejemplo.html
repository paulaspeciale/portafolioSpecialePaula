<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pixel Presentation</title>
  <link rel="stylesheet" href="ejemplo.css">
</head>
<body>

<!-- FLOW -->
<section class="section flow">
  <h1>FLOW</h1>
  <p class="subtitle">Lorem ipsum dolor sit amet</p>

  <div class="steps">
    <div class="step">1. Lorem ipsum</div>
    <div class="step active">2. Lorem ipsum</div>
    <div class="step">3. Lorem ipsum</div>
  </div>
</section>

<!-- CONCEPT -->
<section class="section concept">
  <h1>CONCEPT</h1>

  <div class="cards">
    <div class="card">
      <div class="img"></div>
      <h3>LOREM IPSUM</h3>
      <p>Lorem ipsum dolor sit amet</p>
    </div>

    <div class="card highlight">
      <div class="img"></div>
      <h3>LOREM IPSUM</h3>
      <p>Lorem ipsum dolor sit amet</p>
    </div>

    <div class="card">
      <div class="img"></div>
      <h3>LOREM IPSUM</h3>
      <p>Lorem ipsum dolor sit amet</p>
    </div>
  </div>
</section>

<!-- ANALYSIS -->
<section class="section analysis">
  <h1>ANALYSIS</h1>

  <div class="bars">
    <div class="bar"><span></span></div>
    <div class="bar"><span></span></div>
    <div class="bar"><span></span></div>
  </div>

  <div class="stats">
    <div class="stat">-20%</div>
    <div class="stat">48%</div>
    <div class="stat">80.5%</div>
  </div>
</section>

<!-- NUMBERS -->
<section class="section numbers">
  <h1>NUMBERS</h1>

  <div class="grid">
    <div class="item">93%</div>
    <div class="item">780</div>
    <div class="item">60</div>
    <div class="item">300</div>
    <div class="item">2M</div>
    <div class="item">5</div>
  </div>
</section>

<!-- THANKS -->
<section class="section thanks">
  <h1>THANKS</h1>
</section>

</body>
</html>
